<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Base64 Decode</title>
    </head>
    <body>
    <h1>Base64 Decode</h1>
      <h2>Text to decode</h2>
      <textarea id="encodedText"
                rows="10" 
                cols="60"></textarea>
      <button onclick="decode()">Decode</button>
      
      <h2>Decoded text</h2>
      <textarea id="plainText"
                rows="10" 
                cols="60" 
                readonly></textarea>
      <button id="copyBtn" 
              onclick="copyToClipboard()">Copy to clipboard</button>
      
      <p><a href="base64-encode.html">Encode Bas64</a></p>
      
      <script>
        function decode() {
          const encodedTextArea = document.getElementById("encodedText");
          const encodedText = encodedTextArea.value;
          const plainTextArea = document.getElementById("plainText");
          plainTextArea.value = atob(encodedText);        
        }
        
        function copyToClipboard() {
          const plainTextArea = document.getElementById("plainText");
          const plainText = plainTextArea.value;
          navigator.clipboard.writeText(plainText).then(
            () => {
              /* clipboard successfully set */
              const copyBtn = document.getElementById("copyBtn")
              const originalBtnText = copyBtn.textContent;
              copyBtn.textContent = "Copied!";
              setTimeout(function () {
                copyBtn.textContent = originalBtnText;
              }, 2000);              
            },
            () => {
              /* clipboard write failed */
              console.log("Copy to clipboard failed.");
            },
          );
        }    
      </script>
    </body>
</html>
